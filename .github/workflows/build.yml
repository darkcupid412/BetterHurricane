name: Build

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - 'README.md'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - 'README.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --stacktrace

      - name: Upload platform jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hurricane-jars
          path: |
            platform-paper/build/libs/hurricane-paper-*.jar
            platform-fabric/build/libs/hurricane-fabric-*.jar
            platform-neoforge/build/libs/hurricane-neoforge-*.jar
          if-no-files-found: error

      - name: Publish rolling prerelease
        if: ${{ success() && github.event_name == 'push' && github.ref_name == 'main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete build-latest --yes --cleanup-tag || true
          gh release create build-latest \
            --title "Latest build" \
            --notes "Automated build of \`main\` at ${GITHUB_SHA:0:7}. Development snapshot, not a stable release." \
            --prerelease \
            platform-paper/build/libs/hurricane-paper-*.jar \
            platform-fabric/build/libs/hurricane-fabric-*.jar \
            platform-neoforge/build/libs/hurricane-neoforge-*.jar
